name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Python syntax
        run: python3 -m py_compile scripts/build-timeline.py scripts/verify-app-icon.py
      - name: App icon configuration
        run: python3 scripts/verify-app-icon.py

  macos-build:
    name: macOS app build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build EchoPilot without signing
        run: |
          xcodebuild \
            -project EchoPilot.xcodeproj \
            -scheme EchoPilot \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
